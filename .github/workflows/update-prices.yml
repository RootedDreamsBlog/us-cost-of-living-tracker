name: Update Cost of Living Data

on:
  schedule:
    - cron: '17 14 * * *'  # Daily at 2:17 PM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices and generate dashboard
        run: python scripts/fetch_prices.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json index.html
          git diff --staged --quiet || git commit -m "chore: update cost of living data $(date -u +%Y-%m-%d)"
          git push

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
