name: Update Cost of Living Data

on:
  schedule:
    - cron: '17 14 * * *'  # Daily at 2:17 PM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices and generate dashboard
        run: python scripts/fetch_prices.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json index.html
          git diff --staged --quiet || git commit -m "chore: update cost of living data $(date -u +%Y-%m-%d)"
          git push

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp index.html deploy/

      - name: Deploy to WordPress via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_PATH }}
          protocol: ftps
